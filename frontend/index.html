<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookReviews - Suas Resenhas Literárias</title>
    <link rel="stylesheet" href="styles/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <h1>BookReviews</h1>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#reviews">Resenhas</a></li>
                <li><a href="#login">Login</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="search-container">
            <input type="text" class="search-bar" placeholder="Pesquisar livros...">
            <div class="filters">
                <button class="filter-button">Todos</button>
                <button class="filter-button">Ficção</button>
                <button class="filter-button">Não-Ficção</button>
                <button class="filter-button">Romance</button>
                <button class="filter-button">Fantasia</button>
            </div>
        </section>

        <section class="books-container">
            <!-- Os cards de livros serão inseridos aqui via JavaScript -->
        </section>
    </main>

    <footer>
        <p>&copy; 2025 BookReviews. Todos os direitos reservados.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
